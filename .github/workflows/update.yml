name: 📡 TVArena — Обновление плейлиста

on:
  schedule:
    # Каждый день в 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Ручной запуск из интерфейса GitHub

jobs:
  scrape-and-update:
    name: Парсинг и публикация плейлиста
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Установка Python-зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Установка Playwright + Chromium
        run: |
          playwright install chromium --with-deps

      - name: 🔍 Запуск парсера
        run: |
          python scraper.py

      - name: 📊 Статистика плейлиста
        run: |
          echo "=== Первые 40 строк playlist.m3u ==="
          head -40 playlist.m3u || echo "(файл пуст)"
          echo ""
          echo "=== Количество каналов ==="
          COUNT=$(grep -c '#EXTINF' playlist.m3u 2>/dev/null || echo "0")
          echo "Найдено каналов: $COUNT"

      - name: 💾 Коммит и пуш обновлённого плейлиста
        run: |
          git config user.name  "TVArena Bot 🤖"
          git config user.email "bot@tvarena.local"

          git add playlist.m3u

          if git diff --cached --quiet; then
            echo "✅ Плейлист не изменился — коммит не нужен."
          else
            CHANNELS=$(grep -c '#EXTINF' playlist.m3u 2>/dev/null || echo "0")
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🔄 Авто-обновление | ${DATE} | Каналов: ${CHANNELS}"
            git push
            echo "✅ Плейлист обновлён и запушен."
          fi
